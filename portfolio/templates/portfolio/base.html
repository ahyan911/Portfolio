{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Personal portfolio website built with Django"
    >

    <title>
        {% block title %}
            My Portfolio
        {% endblock %}
    </title>

    <!-- Global CSS -->
    <link
        rel="stylesheet"
        href="{% static 'portfolio/css/style.css' %}"
    >

    <!-- Page-specific CSS -->
    {% block extra_css %}
    {% endblock %}
</head>

<body>

    <!-- Navigation -->
    <header class="site-header">
        <div class="nav-container">

            <a
                href="{% url 'portfolio:home' %}"
                class="logo"
            >
                Portfolio.
            </a>

            <nav class="main-nav">
                <a href="{% url 'portfolio:home' %}">
                    Home
                </a>

                <a href="{% url 'portfolio:projects' %}">
                    Projects
                </a>

                <a href="{% url 'portfolio:contact' %}">
                    Contact
                </a>
            </nav>

        </div>
    </header>

    <!-- Main Page Content -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-container">
            <p>
                &copy; {% now "Y" %} My Portfolio. All rights reserved.
            </p>

            <div class="footer-links">
                <a href="{% url 'portfolio:home' %}">
                    Home
                </a>

                <a href="{% url 'portfolio:projects' %}">
                    Projects
                </a>

                <a href="{% url 'portfolio:contact' %}">
                    Contact
                </a>
            </div>
        </div>
    </footer>

    <!-- Page-specific JavaScript -->
    {% block extra_js %}
    {% endblock %}

</body>
</html>
